<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P1EN HUB</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#08080f;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px}
        .app{width:100%;max-width:650px}
        .auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:50px 40px;text-align:center}
        .auth-logo{font-size:40px;font-weight:200;letter-spacing:12px;color:#fff}.auth-logo b{font-weight:600;color:#aaa}
        .auth-sub{font-size:11px;letter-spacing:6px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:25px}
        .auth-input{width:100%;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:12px}
        .auth-btn{width:100%;padding:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-size:15px;cursor:pointer;margin-bottom:8px}
        .auth-btn:hover{background:rgba(255,255,255,0.1)}
        .auth-btn.admin-btn{border-color:rgba(255,107,53,0.3);color:#ff6b35;background:rgba(255,107,53,0.05)}
        .auth-link{font-size:12px;color:rgba(255,255,255,0.2);cursor:pointer;background:none;border:none;display:block;margin:10px auto 0}.auth-link:hover{color:#fff}
        .auth-error{color:#f55;font-size:12px;margin-top:10px;display:none}
        .main-screen{display:none}
        .top-bar{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:10px}
        .back-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;display:none}
        .refresh-top{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;margin-left:auto}
        .page{display:none}.page.active{display:block}
        .header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 10px}
        .logo{font-size:38px;font-weight:200;letter-spacing:10px}.logo b{font-weight:600;color:#aaa}
        .subtitle{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,0.3)}
        .user-row{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.4)}
        .user-dot{width:7px;height:7px;border-radius:50%}.user-dot.admin{background:#ff6b35}.user-dot.user{background:rgba(255,255,255,0.3)}
        .user-name{color:#fff;font-weight:500}
        .admin-badge{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,107,53,0.15);color:#ff6b35;border:1px solid rgba(255,107,53,0.3)}
        .logout-link{color:rgba(255,255,255,0.2);cursor:pointer;background:none;border:none;font-size:12px}.logout-link:hover{color:#f55}
        .notification-badge{background:#f55;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;animation:blink 1s infinite;cursor:pointer;display:none}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
        .admin-panel{background:rgba(255,107,53,0.03);border:1px solid rgba(255,107,53,0.2);border-radius:16px;padding:18px;margin-bottom:15px}
        .admin-title{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:#ff6b35;margin-bottom:12px}
        .admin-actions{display:flex;gap:8px;flex-wrap:wrap}
        .admin-btn-action{padding:8px 14px;border:1px solid rgba(255,107,53,0.2);border-radius:10px;font-size:11px;cursor:pointer;background:rgba(255,107,53,0.05);color:#ff6b35}
        .admin-btn-action:hover{background:rgba(255,107,53,0.15)}
        .admin-btn-action.invite{border-color:rgba(100,200,255,0.3);color:#6cf;background:rgba(100,200,255,0.05)}
        .admin-info{font-size:10px;color:rgba(255,107,53,0.4);margin-top:10px}
        .invite-card{background:rgba(255,255,255,0.015);border:1px solid rgba(100,200,255,0.15);border-radius:16px;padding:25px;margin-bottom:15px}
        .invite-title{font-size:14px;color:#6cf;margin-bottom:20px}
        .invite-input{width:100%;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(100,200,255,0.2);border-radius:10px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:12px}
        .invite-btn{width:100%;padding:12px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.3);border-radius:10px;color:#6cf;font-size:14px;cursor:pointer}
        .invite-btn:hover{background:rgba(100,200,255,0.2)}
        .invite-list{display:flex;flex-direction:column;gap:8px;margin-top:15px}
        .invite-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;font-size:13px}
        .code-display{background:rgba(0,0,0,0.4);border:1px solid #6cf;border-radius:8px;padding:6px 10px;font-family:monospace;color:#6cf;font-size:11px;cursor:pointer;user-select:all}
        .status-badge{font-size:10px;padding:3px 8px;border-radius:8px}
        .status-pending{background:rgba(255,200,50,0.1);color:#fc3;border:1px solid rgba(255,200,50,0.2)}
        .status-accepted{background:rgba(100,200,100,0.1);color:#6c6;border:1px solid rgba(100,200,100,0.2)}
        .status-declined{background:rgba(255,80,80,0.1);color:#f55;border:1px solid rgba(255,80,80,0.2)}
        .invite-actions{display:flex;gap:6px}
        .invite-accept{background:rgba(100,200,100,0.1);border:1px solid rgba(100,200,100,0.3);color:#6c6;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}
        .invite-decline{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#f55;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}
        .no-invites{text-align:center;color:rgba(255,255,255,0.2);font-size:12px;padding:15px}
        .matches-block{background:rgba(255,255,255,0.015);border:1px solid rgba(255,107,53,0.1);border-radius:16px;padding:18px;margin-bottom:15px}
        .matches-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .matches-label{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,0.3)}
        .filters-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
        .filter-btn{padding:5px 10px;border:1px solid rgba(255,255,255,0.08);border-radius:15px;font-size:10px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.4)}
        .filter-btn.active{background:rgba(255,255,255,0.06);color:#fff}
        .match-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
        .match-time{font-size:12px;color:rgba(255,255,255,0.4);min-width:50px}
        .match-teams{flex:1;font-size:13px}.match-teams .v{color:#fff;font-weight:500}.match-teams .d{color:rgba(255,255,255,0.4)}
        .match-stars{display:flex;gap:1px}.star{color:rgba(255,200,50,0.2);font-size:11px}.star.on{color:#fc3}
        .match-event{font-size:9px;color:rgba(255,255,255,0.2)}
        .search-box{position:relative;margin-bottom:15px}
        .search-box span{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2)}
        .search-box input{width:100%;padding:14px 16px 14px 42px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px;color:#fff;font-size:14px;outline:none}
        .btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
        .btn{padding:12px 22px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.02);color:#fff}
        .btn-primary{background:rgba(255,255,255,0.06)}.btn-danger{color:#f55;border-color:rgba(255,80,80,0.15)}.btn-green{color:#6c6;border-color:rgba(100,200,100,0.15)}
        .trainings-list{display:flex;flex-direction:column;gap:10px}
        .training-card{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:18px 22px;cursor:pointer}
        .training-card:hover{background:rgba(255,255,255,0.03)}
        .card-top{display:flex;justify-content:space-between;margin-bottom:10px}.card-name{font-size:16px;font-weight:500}
        .card-tag{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid}
        .tag-aim{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}.tag-movement{border-color:rgba(150,180,255,0.2);color:rgba(150,180,255,0.5)}
        .tag-grenades{border-color:rgba(150,255,180,0.2);color:rgba(150,255,180,0.5)}.tag-tactics{border-color:rgba(220,180,255,0.2);color:rgba(220,180,255,0.5)}
        .card-meta{display:flex;gap:15px;font-size:12px;color:rgba(255,255,255,0.3)}.card-author{font-size:10px;color:rgba(255,255,255,0.12);text-align:right}
        .empty-card{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:20px;padding:50px;text-align:center}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:100;padding:20px}
        .modal{background:rgba(20,20,28,0.95);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:30px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
        .form-group{margin-bottom:18px}.form-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:6px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:#fff;font-size:14px;outline:none;font-family:inherit}
        .form-group textarea{resize:vertical;min-height:70px}.form-group select option{background:#1a1a22;color:#fff}
        .radio-row{display:flex;gap:8px}.radio-row input{display:none}
        .radio-row span{display:block;text-align:center;padding:10px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.35)}
        .radio-row input:checked+span{border-color:#fff;color:#fff}
        .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:25px}
        .code-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px;text-align:center;font-size:12px;color:rgba(255,255,255,0.5);word-break:break-all;cursor:pointer;font-family:monospace}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
        .detail-item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:14px}
        .detail-item .lbl{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
        .detail-author{display:flex;align-items:center;gap:8px;margin-top:14px;padding:12px;background:rgba(255,255,255,0.015);border-radius:10px}
        .detail-author .av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:11px}
        .instr-box{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:16px;white-space:pre-line;line-height:1.7;color:rgba(255,255,255,0.5);font-size:13px}
        .success-msg{background:rgba(100,200,100,0.06);border:1px solid rgba(100,200,100,0.12);border-radius:10px;padding:12px;text-align:center;color:#6c6;margin-bottom:15px;display:none}
    </style>
</head>
<body>
<div class="app">
    <div class="auth-card" id="loginScreen">
        <div class="auth-logo">P<b>1</b>EN HUB</div><div class="auth-sub">вход</div>
        <input class="auth-input" id="loginNick" placeholder="никнейм" maxlength="20">
        <input class="auth-input" id="loginPass" type="password" placeholder="пароль">
        <div class="auth-error" id="loginError"></div>
        <button class="auth-btn" onclick="doLogin()">войти</button>
        <button class="auth-link" onclick="showRegister()">создать аккаунт</button>
        <button class="auth-btn admin-btn" onclick="showAdminLogin()">🔑 вход для админа</button>
    </div>
    <div class="auth-card" id="registerScreen" style="display:none">
        <div class="auth-logo">P<b>1</b>EN HUB</div><div class="auth-sub">регистрация</div>
        <input class="auth-input" id="regNick" placeholder="никнейм" maxlength="20">
        <input class="auth-input" id="regPass" type="password" placeholder="пароль">
        <input class="auth-input" id="regPass2" type="password" placeholder="повторите пароль">
        <div class="auth-error" id="regError"></div>
        <button class="auth-btn" onclick="doRegister()">создать</button>
        <button class="auth-link" onclick="showLogin()">← назад</button>
    </div>
    <div class="auth-card" id="adminLoginScreen" style="display:none">
        <div class="auth-logo">P<b>1</b>EN HUB</div><div class="auth-sub" style="color:#ff6b35">админ</div>
        <input class="auth-input" id="adminLoginInput" placeholder="логин">
        <input class="auth-input" id="adminPassInput" type="password" placeholder="пароль">
        <div class="auth-error" id="adminError"></div>
        <button class="auth-btn admin-btn" onclick="doAdminLogin()">войти</button>
        <button class="auth-link" onclick="showLogin()">← назад</button>
    </div>

    <div class="main-screen" id="appScreen">
        <div class="top-bar">
            <button class="back-btn" id="backBtn" onclick="goBack()">← назад</button>
            <span class="notification-badge" id="notifBadge" onclick="checkMyInvites()">📨</span>
            <button class="refresh-top" onclick="refreshAll()">🔄</button>
        </div>
        <div class="page active" id="mainPage">
            <div class="header">
                <div><div class="logo">P<b>1</b>EN HUB</div><div class="subtitle">система тренировок</div></div>
                <div class="user-row">
                    <span class="user-dot" id="userDot"></span><span class="user-name" id="userNameDisplay"></span>
                    <span class="admin-badge" id="adminBadge" style="display:none">ADMIN</span>
                    <button class="logout-link" onclick="logout()">выход</button>
                </div>
            </div>
            <div class="admin-panel" id="adminPanel" style="display:none">
                <div class="admin-title">🛡️ Админ-панель</div>
                <div class="admin-actions">
                    <button class="admin-btn-action invite" onclick="showPage('invite')">👥 Приглашения</button>
                    <button class="admin-btn-action" onclick="adminBroadcast()">📢 Сообщение</button>
                    <button class="admin-btn-action" onclick="adminAddGlobal()">➕ Тренировка</button>
                </div>
            </div>
            <div class="matches-block">
                <div class="matches-top"><span class="matches-label">🎮 Матчи CS2</span></div>
                <div class="filters-row">
                    <button class="filter-btn active" onclick="filterM('all',this)">Все</button>
                    <button class="filter-btn" onclick="filterM('live',this)">🔴 Live</button>
                    <button class="filter-btn" onclick="filterM('top',this)">⭐ Топ</button>
                </div>
                <div id="matchesContent"></div>
            </div>
            <div class="search-box"><span>⌕</span><input type="text" id="search" placeholder="поиск..." oninput="showList()"></div>
            <div class="btn-row"><button class="btn btn-primary" onclick="openForm()">+ тренировка</button><button class="btn" onclick="openCodeModal()">импорт</button></div>
            <div class="trainings-list" id="list"></div>
            <div class="empty-card" id="empty"><div class="empty-icon">○</div><div class="empty-title">нет тренировок</div></div>
        </div>
        <div class="page" id="invitePage">
            <div class="invite-card">
                <div class="invite-title">👥 Пригласить игрока</div>
                <input class="invite-input" id="inviteNickInput" placeholder="никнейм игрока">
                <button class="invite-btn" onclick="sendInvite()">📨 Отправить приглашение</button>
                <div id="inviteCodeDisplay" style="margin-top:10px;display:none"></div>
            </div>
            <div class="invite-card">
                <div class="invite-title">📋 Приглашения</div>
                <div class="invite-list" id="inviteList"></div>
            </div>
        </div>
        <div class="page" id="myInvitesPage">
            <div class="invite-card">
                <div class="invite-title">📨 Мои приглашения</div>
                <div class="invite-list" id="myInviteList"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailModal"><div class="modal">
    <div style="display:flex;justify-content:space-between"><span class="card-tag" id="detailBadge"></span><button class="btn" onclick="closeDetail()">✕</button></div>
    <h3 id="detailName"></h3><div class="detail-author"><div class="av" id="detailAuthorAvatar"></div><div><span style="color:rgba(255,255,255,0.3);font-size:11px">автор</span><br><span id="detailAuthor"></span></div></div>
    <div class="detail-grid"><div class="detail-item"><div class="lbl">карта</div><div id="detailMap"></div></div><div class="detail-item"><div class="lbl">длит</div><div id="detailDuration"></div></div><div class="detail-item"><div class="lbl">сложн</div><div id="detailDifficulty"></div></div><div class="detail-item"><div class="lbl">катег</div><div id="detailCategory"></div></div></div>
    <div id="detailDescSection"><div class="lbl">описание</div><div id="detailDesc"></div></div>
    <div id="detailInstrSection"><div class="lbl">инструкция</div><div class="instr-box" id="detailInstr"></div></div>
    <div class="modal-actions"><button class="btn btn-green" onclick="shareTraining()">поделиться</button><button class="btn btn-danger" onclick="deleteTraining()">удалить</button><button class="btn" onclick="editTraining()">изменить</button></div>
</div></div>
<div class="modal-overlay" id="formModal"><div class="modal">
    <h3 id="modalTitle"></h3><input type="hidden" id="editId">
    <div class="form-group"><label>название</label><input id="trainName"></div>
    <div class="form-group"><label>категория</label><select id="trainCat"><option value="aim">аим</option><option value="movement">движение</option><option value="grenades">гранаты</option><option value="tactics">тактика</option></select></div>
    <div class="form-group"><label>карта</label><select id="trainMap"><option value="">нет</option><option>Mirage</option><option>Inferno</option><option>Nuke</option><option>Overpass</option><option>Vertigo</option><option>Ancient</option><option>Anubis</option><option>Aim Map</option></select></div>
    <div class="form-group"><label>длит (мин)</label><input type="number" id="trainDur" value="15"></div>
    <div class="form-group"><label>сложность</label><div class="radio-row"><label><input type="radio" name="diff" value="easy"><span>легкая</span></label><label><input type="radio" name="diff" value="medium" checked><span>средняя</span></label><label><input type="radio" name="diff" value="hard"><span>сложная</span></label></div></div>
    <div class="form-group"><label>описание</label><textarea id="trainDesc" rows="2"></textarea></div>
    <div class="form-group"><label>инструкция</label><textarea id="trainInstr" rows="3"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeForm()">отмена</button><button class="btn btn-primary" onclick="saveTraining()">сохранить</button></div>
</div></div>
<div class="modal-overlay" id="shareModal"><div class="modal" style="text-align:center"><h3>код</h3><div class="code-block" id="shareCode" onclick="copyCode()"></div><div class="modal-actions" style="justify-content:center"><button class="btn btn-primary" onclick="copyCode()">копировать</button><button class="btn" onclick="closeShare()">закрыть</button></div></div></div>
<div class="modal-overlay" id="codeModal"><div class="modal" style="text-align:center"><h3>импорт</h3><textarea id="codeInput" style="width:100%;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:#fff;font-size:13px;min-height:100px;text-align:center;font-family:monospace;outline:none"></textarea><div class="success-msg" id="successMsg">успешно!</div><div class="modal-actions"><button class="btn btn-primary" onclick="addByCode()">импорт</button><button class="btn" onclick="closeCodeModal()">отмена</button></div></div></div>
<div class="modal-overlay" id="deleteModal"><div class="modal" style="text-align:center"><h3>удалить?</h3><p style="color:#f55" id="deleteNameText"></p><div class="modal-actions"><button class="btn" onclick="closeDelete()">отмена</button><button class="btn btn-danger" onclick="confirmDelete()">удалить</button></div></div></div>

<script>
var T=[],D=null,S='',U='',I=null,M=[],F='all',A=false,INV=[],CP='main';
var CN={aim:'аим',movement:'движение',grenades:'гранаты',tactics:'тактика'};
var DN={easy:'легкая',medium:'средняя',hard:'сложная'};
var BG={aim:'tag-aim',movement:'tag-movement',grenades:'tag-grenades',tactics:'tag-tactics'};
var AL='p1en0101',AP='nep1en112201';

function GU(){var d=localStorage.getItem('p1enhub_users');return d?JSON.parse(d):{}}
function SU(u){localStorage.setItem('p1enhub_users',JSON.stringify(u))}
function GI(){var d=localStorage.getItem('p1enhub_invites');return d?JSON.parse(d):[]}
function SI(i){localStorage.setItem('p1enhub_invites',JSON.stringify(i))}

// ===== ПРИГЛАШЕНИЯ =====
function loadInvites(){INV=GI()}
function sendInvite(){
    var nick=document.getElementById('inviteNickInput').value.trim();
    if(!nick){alert('Введите ник');return}
    var users=GU();
    if(!users[nick]&&nick!==AL){alert('Пользователь не найден');return}
    if(nick===U){alert('Нельзя себя');return}
    var code='INV-'+Math.random().toString(36).substring(2,8).toUpperCase();
    INV.unshift({code:code,nick:nick,from:U,status:'pending',date:new Date().toLocaleDateString()});
    SI(INV);document.getElementById('inviteNickInput').value='';
    var disp=document.getElementById('inviteCodeDisplay');
    disp.style.display='block';
    disp.innerHTML='<div class="code-display" onclick="navigator.clipboard.writeText(\''+code+'\');alert(\'Скопировано!\')">📋 Код: '+code+' (нажми чтобы скопировать)</div><p style="font-size:10px;color:rgba(255,255,255,0.3)">Отправь этот код игроку. Он должен ввести его в "Импорт кода"</p>';
    renderInvites();alert('Приглашение создано! Скопируй код и отправь игроку.')
}
function renderInvites(){
    var c=document.getElementById('inviteList');
    if(INV.length===0){c.innerHTML='<div class="no-invites">нет приглашений</div>';return}
    c.innerHTML=INV.map(function(inv,i){return'<div class="invite-item"><span>'+inv.nick+' <span class="status-badge status-'+inv.status+'">'+inv.status+'</span></span><span class="code-display" onclick="navigator.clipboard.writeText(\''+inv.code+'\');alert(\'Скопировано!\')">'+inv.code+'</span><span style="color:rgba(255,255,255,0.2);font-size:10px">'+inv.date+'</span></div>'}).join('');
}
function checkMyInvites(){
    if(!U||A)return;
    var inv=GI(),found=inv.filter(function(x){return x.nick===U&&x.status==='pending'});
    var badge=document.getElementById('notifBadge');
    if(found.length>0){badge.style.display='inline-block';badge.textContent='📨 '+found.length;badge.onclick=function(){showPage('myInvitesPage')}}
    else{badge.style.display='none'}
}
function renderMyInvites(){
    var inv=GI(),mine=inv.filter(function(x){return x.nick===U});
    var c=document.getElementById('myInviteList');
    if(mine.length===0){c.innerHTML='<div class="no-invites">нет приглашений</div>';return}
    c.innerHTML=mine.map(function(inv,i){
        var actions='';
        if(inv.status==='pending')actions='<div class="invite-actions"><button class="invite-accept" onclick="respondInvite(\''+inv.code+'\',\'accepted\')">✅ Принять</button><button class="invite-decline" onclick="respondInvite(\''+inv.code+'\',\'declined\')">❌ Отклонить</button></div>';
        return'<div class="invite-item"><div><span>От: '+inv.from+'</span><br><span class="status-badge status-'+inv.status+'">'+inv.status+'</span></div>'+actions+'</div>';
    }).join('');
}
function respondInvite(code,status){
    var inv=GI();
    for(var i=0;i<inv.length;i++){if(inv[i].code===code){inv[i].status=status;break}}
    SI(inv);INV=inv;renderMyInvites();checkMyInvites();alert(status==='accepted'?'Вы приняли приглашение!':'Вы отклонили приглашение')
}

function renderMatches(){
    var c=document.getElementById('matchesContent'),f=M;
    if(F==='live')f=f.filter(function(m){return m.live});if(F==='top')f=f.filter(function(m){return m.stars>=4});

// ===== КОДЫ =====
function encode(td){return'P1EN:'+btoa(unescape(encodeURIComponent(JSON.stringify({n:td.name,c:td.category,m:td.map,d:td.duration,f:td.difficulty,e:td.description,i:td.instructions,a:td.author||U}))))}
function decode(s){try{s=s.trim();if(s.indexOf('P1EN:')!==0)return null;s=s.replace('P1EN:','');var d=JSON.parse(decodeURIComponent(escape(atob(s))));d.id=Date.now();return d}catch(e){return null}}

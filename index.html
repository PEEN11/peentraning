<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P1EN HUB</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',sans-serif;
            background:#06060d;
            color:#fff;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            overflow-x:hidden;
        }
        /* АНИМИРОВАННЫЙ ФОН */
        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:
                radial-gradient(ellipse at 20% 20%,rgba(255,107,53,0.06) 0%,transparent 50%),
                radial-gradient(ellipse at 80% 80%,rgba(100,200,255,0.04) 0%,transparent 50%),
                radial-gradient(ellipse at 50% 50%,rgba(255,255,255,0.02) 0%,transparent 50%);
            pointer-events:none;z-index:0;
            animation:bgMove 20s ease infinite;
        }
        @keyframes bgMove{
            0%,100%{transform:translate(0,0)}
            25%{transform:translate(10px,-10px)}
            50%{transform:translate(-5px,5px)}
            75%{transform:translate(-10px,-5px)}
        }
        .app{width:100%;max-width:600px;position:relative;z-index:1}
        .card{
            background:rgba(255,255,255,0.02);
            backdrop-filter:blur(40px);
            -webkit-backdrop-filter:blur(40px);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:28px;
            padding:50px 40px;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.03);
            position:relative;
            overflow:hidden;
        }
        .card::after{
            content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
            background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.01) 50%,transparent 60%);
            animation:cardShine 8s ease infinite;
            pointer-events:none;
        }
        @keyframes cardShine{0%{transform:translate(-100%,-100%)}100%{transform:translate(100%,100%)}}
        .logo-text{
            font-size:44px;font-weight:200;letter-spacing:14px;color:#fff;
            text-shadow:0 0 40px rgba(255,107,53,0.3);
            margin-bottom:6px;
        }
        .logo-text b{font-weight:600;color:#ff6b35;text-shadow:0 0 30px rgba(255,107,53,0.6)}
        .sub-text{font-size:11px;letter-spacing:8px;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-bottom:30px}
        .input-field{
            width:100%;padding:14px;background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.06);border-radius:16px;
            color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:12px;
            transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .input-field:focus{
            border-color:rgba(255,107,53,0.4);
            box-shadow:0 0 30px rgba(255,107,53,0.1),0 0 60px rgba(255,107,53,0.05);
            transform:scale(1.02);
            background:rgba(255,107,53,0.03);
        }
        .btn-main{
            width:100%;padding:15px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:16px;
            color:#fff;font-size:15px;cursor:pointer;margin-bottom:8px;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            position:relative;overflow:hidden;
        }
        .btn-main::after{
            content:'';position:absolute;top:50%;left:50%;width:0;height:0;
            background:rgba(255,255,255,0.1);border-radius:50%;
            transform:translate(-50%,-50%);transition:all 0.6s;
        }
        .btn-main:active::after{width:400px;height:400px}
        .btn-main:active{transform:scale(0.95)}
        .btn-main:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.4)}
        .btn-admin{border-color:rgba(255,107,53,0.2);color:#ff6b35;background:rgba(255,107,53,0.03)}
        .btn-admin:hover{border-color:rgba(255,107,53,0.4);box-shadow:0 10px 30px rgba(255,107,53,0.2)}
        .link-text{font-size:12px;color:rgba(255,255,255,0.15);cursor:pointer;background:none;border:none;display:block;margin:12px auto 0;transition:all 0.3s}.link-text:hover{color:rgba(255,255,255,0.5)}
        .main-screen{display:none}
        .header-row{display:flex;justify-content:space-between;align-items:center;padding:20px 0 15px}
        .logo-small{font-size:34px;font-weight:200;letter-spacing:10px}.logo-small b{font-weight:600;color:#ff6b35}
        .sub-small{font-size:9px;letter-spacing:6px;color:rgba(255,255,255,0.2)}
        .user-info{display:flex;align-items:center;gap:10px;font-size:13px}
        .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);box-shadow:0 0 10px rgba(255,255,255,0.1)}.dot.admin-dot{background:#ff6b35;box-shadow:0 0 15px rgba(255,107,53,0.5)}
        .user-name{color:#fff;font-weight:500}
        .btn-logout{color:rgba(255,255,255,0.15);cursor:pointer;background:none;border:none;font-size:12px;transition:all 0.3s}.btn-logout:hover{color:#f55}
        .badge-admin{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(255,107,53,0.1);color:#ff6b35;border:1px solid rgba(255,107,53,0.2);display:none;letter-spacing:1px}
        .notif-badge{
            background:linear-gradient(135deg,#f55,#ff2020);color:#fff;font-size:10px;
            padding:4px 10px;border-radius:14px;cursor:pointer;display:none;
            animation:notifBounce 0.6s cubic-bezier(0.68,-0.55,0.27,1.55),notifGlow 1.5s infinite;
            box-shadow:0 0 20px rgba(255,30,30,0.5);position:relative;
        }
        @keyframes notifBounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
        @keyframes notifGlow{0%,100%{box-shadow:0 0 15px rgba(255,30,30,0.5)}50%{box-shadow:0 0 30px rgba(255,30,30,0.9),0 0 50px rgba(255,30,30,0.3)}}
        .notif-badge::after{
            content:'';position:absolute;top:-3px;right:-3px;
            width:8px;height:8px;border-radius:50%;background:#fff;
            animation:notifDot 0.8s infinite;
        }
        @keyframes notifDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.5)}}
        .msg-card{
            background:rgba(255,180,30,0.04);border:1px solid rgba(255,180,30,0.15);
            border-radius:16px;padding:16px;margin-bottom:15px;display:none;
            animation:msgSlide 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes msgSlide{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
        .msg-text{color:#fc3;font-size:13px;font-weight:500}
        .panel-admin{
            background:rgba(255,107,53,0.02);border:1px solid rgba(255,107,53,0.15);
            border-radius:20px;padding:20px;margin-bottom:15px;display:none;
        }
        .panel-title{font-size:10px;text-transform:uppercase;letter-spacing:4px;color:#ff6b35;margin-bottom:14px;font-weight:600}
        .panel-actions{display:flex;gap:8px;flex-wrap:wrap}
        .btn-panel{
            padding:9px 16px;border:1px solid rgba(255,107,53,0.15);border-radius:12px;
            font-size:11px;cursor:pointer;background:rgba(255,107,53,0.03);color:#ff6b35;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;
        }
        .btn-panel::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,107,53,0.2);border-radius:50%;transform:translate(-50%,-50%);transition:all 0.5s}
        .btn-panel:active::after{width:300px;height:300px}
        .btn-panel:active{transform:scale(0.93)}
        .btn-panel:hover{background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.3);transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,53,0.15)}
        .top-bar{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:5px}
        .btn-back{
            background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
            color:#fff;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:12px;
            display:none;transition:all 0.3s;
        }
        .btn-back:hover{background:rgba(255,255,255,0.05);transform:translateX(-2px)}
        .btn-refresh{
            background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
            color:#fff;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:12px;
            margin-left:auto;transition:all 0.3s;
        }
        .btn-refresh:hover{background:rgba(255,255,255,0.05);transform:rotate(180deg)}
        .btn-refresh:active{transform:rotate(360deg) scale(0.9)}
        .page{display:none}.page.active{display:block}
        .invite-card{
            background:rgba(100,200,255,0.02);border:1px solid rgba(100,200,255,0.08);
            border-radius:20px;padding:22px;margin-bottom:15px;
        }
        .invite-title{font-size:13px;color:#6cf;margin-bottom:16px;font-weight:500;letter-spacing:0.5px}
        .invite-input{
            width:100%;padding:11px;background:rgba(255,255,255,0.02);
            border:1px solid rgba(100,200,255,0.1);border-radius:10px;
            color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:10px;
            transition:all 0.4s;
        }
        .invite-input:focus{border-color:rgba(100,200,255,0.3);box-shadow:0 0 20px rgba(100,200,255,0.1)}
        .invite-btn{
            width:100%;padding:11px;background:rgba(100,200,255,0.06);
            border:1px solid rgba(100,200,255,0.15);border-radius:10px;
            color:#6cf;font-size:13px;cursor:pointer;transition:all 0.3s;
        }
        .invite-btn:hover{background:rgba(100,200,255,0.12);transform:translateY(-1px)}
        .invite-btn:active{transform:scale(0.95)}
        .invite-list{display:flex;flex-direction:column;gap:8px;margin-top:15px}
        .invite-item{
            display:flex;justify-content:space-between;align-items:center;
            padding:10px 14px;background:rgba(255,255,255,0.015);border-radius:10px;
            font-size:12px;animation:itemIn 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes itemIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        .status-pending{color:#fc3;animation:statusBlink 2s infinite}
        @keyframes statusBlink{0%,100%{opacity:1}50%{opacity:0.4}}
        .status-accepted{color:#6c6}.status-declined{color:#f55}
        .no-data{text-align:center;color:rgba(255,255,255,0.15);font-size:12px;padding:20px}
        .search-box{position:relative;margin-bottom:15px}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.15);font-size:15px}
        .search-input{
            width:100%;padding:14px 16px 14px 44px;background:rgba(255,255,255,0.015);
            border:1px solid rgba(255,255,255,0.04);border-radius:16px;
            color:#fff;font-size:14px;outline:none;transition:all 0.4s;
        }
        .search-input:focus{border-color:rgba(255,255,255,0.12);box-shadow:0 0 25px rgba(255,107,53,0.08)}
        .btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
        .btn-action{
            padding:12px 24px;border:1px solid rgba(255,255,255,0.06);border-radius:14px;
            cursor:pointer;font-size:13px;background:rgba(255,255,255,0.02);color:#fff;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;
        }
        .btn-action::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,0.08);border-radius:50%;transform:translate(-50%,-50%);transition:all 0.5s}
        .btn-action:active::after{width:350px;height:350px}
        .btn-action:active{transform:scale(0.93)}
        .btn-action:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
        .btn-primary{background:rgba(255,255,255,0.04)}
        .btn-danger{color:#f55;border-color:rgba(255,80,80,0.1)}.btn-danger:hover{background:rgba(255,80,80,0.06);border-color:rgba(255,80,80,0.25);box-shadow:0 8px 25px rgba(255,80,80,0.15)}
        .btn-green{color:#6c6;border-color:rgba(100,200,100,0.1)}.btn-green:hover{background:rgba(100,200,100,0.06);border-color:rgba(100,200,100,0.25);box-shadow:0 8px 25px rgba(100,200,100,0.15)}
        .list{display:flex;flex-direction:column;gap:10px}
        .item{
            background:rgba(255,255,255,0.012);border:1px solid rgba(255,255,255,0.03);
            border-radius:18px;padding:20px 24px;cursor:pointer;
            transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .item:hover{
            background:rgba(255,255,255,0.025);border-color:rgba(255,255,255,0.06);
            transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }
        .item:active{transform:scale(0.98)}
        .item-top{display:flex;justify-content:space-between;margin-bottom:10px}.item-name{font-size:16px;font-weight:500}
        .item-tag{font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid;letter-spacing:0.5px}
        .tag-aim{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4)}.tag-movement{border-color:rgba(100,180,255,0.2);color:rgba(100,180,255,0.5)}.tag-grenades{border-color:rgba(100,220,150,0.2);color:rgba(100,220,150,0.5)}.tag-tactics{border-color:rgba(200,150,255,0.2);color:rgba(200,150,255,0.5)}
        .item-meta{display:flex;gap:15px;font-size:11px;color:rgba(255,255,255,0.25)}.item-author{font-size:9px;color:rgba(255,255,255,0.08);text-align:right;margin-top:4px}
        .empty{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:22px;padding:60px;text-align:center}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);justify-content:center;align-items:center;z-index:100;padding:20px}
        .modal{
            background:rgba(18,18,28,0.95);border:1px solid rgba(255,255,255,0.05);
            border-radius:28px;padding:35px;width:100%;max-width:480px;max-height:85vh;
            overflow-y:auto;animation:modalIn 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow:0 30px 80px rgba(0,0,0,0.6);
        }
        @keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .form-group{margin-bottom:18px}.form-group label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:6px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:12px;color:#fff;font-size:14px;outline:none;font-family:inherit;transition:all 0.3s}
        .form-group textarea{resize:vertical;min-height:70px}.form-group select option{background:#1a1a25;color:#fff}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(255,107,53,0.3);box-shadow:0 0 20px rgba(255,107,53,0.06)}
        .radio-row{display:flex;gap:8px}.radio-row input{display:none}.radio-row span{display:block;text-align:center;padding:10px;border:1px solid rgba(255,255,255,0.04);border-radius:10px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.3);transition:all 0.3s}.radio-row input:checked+span{border-color:rgba(255,255,255,0.2);color:#fff;background:rgba(255,255,255,0.03)}
        .modal-buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:25px}
        .code-block{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:18px;text-align:center;font-size:12px;color:rgba(255,255,255,0.4);word-break:break-all;cursor:pointer;font-family:monospace;transition:all 0.3s}.code-block:hover{border-color:rgba(255,255,255,0.1)}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
        .detail-item{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:12px;padding:14px}
        .detail-label{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.2)}
        .author-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding:12px;background:rgba(255,255,255,0.01);border-radius:12px}
        .author-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,107,53,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:#ff6b35;font-weight:600}
        .instructions-box{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:12px;padding:16px;white-space:pre-line;line-height:1.8;color:rgba(255,255,255,0.4);font-size:13px}
    </style>
</head>
<body>
<div class="app">
    <div class="card" id="loginScreen">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text">training system</div>
        <input class="input-field" id="nickInput" placeholder="nickname" maxlength="20" autocomplete="off">
        <input class="input-field" id="passInput" type="password" placeholder="password">
        <button class="btn-main" onclick="doLogin()">enter</button>
        <button class="btn-main btn-admin" onclick="showAdmin()">admin</button>
        <button class="link-text" onclick="register()">create account</button>
    </div>
    <div class="card" id="adminScreen" style="display:none">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text" style="color:#ff6b35">admin panel</div>
        <input class="input-field" id="adminLoginInput" placeholder="login">
        <input class="input-field" id="adminPassInput" type="password" placeholder="password">
        <button class="btn-main btn-admin" onclick="doAdminLogin()">enter</button>
        <button class="link-text" onclick="showLogin()">← back</button>
    </div>
    <div class="main-screen" id="appScreen">
        <div class="top-bar">
            <button class="btn-back" id="backBtn" onclick="showPage('main')">← back</button>
            <span class="notif-badge" id="notifBadge" onclick="showPage('invites')"></span>
            <button class="btn-refresh" onclick="loadAll()">↻</button>
        </div>
        <div class="page active" id="mainPage">
            <div class="header-row">
                <div><div class="logo-small">P<b>1</b>EN HUB</div><div class="sub-small">training system</div></div>
                <div class="user-info">
                    <span class="dot" id="userDot"></span><span class="user-name" id="userNameDisplay"></span>
                    <span class="badge-admin" id="adminBadge">ADMIN</span>
                    <button class="btn-logout" onclick="logout()">exit</button>
                </div>
            </div>
            <div class="msg-card" id="msgCard"><div class="msg-text" id="msgText"></div></div>
            <div class="panel-admin" id="adminPanel">
                <div class="panel-title">admin controls</div>
                <div class="panel-actions">
                    <button class="btn-panel" onclick="showPage('invites')">invites</button>
                    <button class="btn-panel" onclick="sendBroadcast()">broadcast</button>
                </div>
            </div>
            <div class="search-box"><span class="search-icon">⌕</span><input class="search-input" id="search" placeholder="search..." oninput="showList()"></div>
            <div class="btn-row"><button class="btn-action btn-primary" onclick="openForm()">+ training</button><button class="btn-action" onclick="openCodeModal()">import</button></div>
            <div class="list" id="list"></div>
            <div class="empty" id="empty"><div style="font-size:40px;opacity:0.2">○</div><div style="color:rgba(255,255,255,0.2)">no trainings</div></div>
        </div>
        <div class="page" id="invitesPage">
            <div class="invite-card" id="sendInviteCard" style="display:none">
                <div class="invite-title">invite player</div>
                <input class="invite-input" id="inviteNickInput" placeholder="nickname">
                <button class="invite-btn" onclick="sendInvite()">send invite</button>
            </div>
            <div class="invite-card">
                <div class="invite-title">invitations</div>
                <div class="invite-list" id="inviteList"></div>
            </div>
        </div>
    </div>
</div>
<div class="modal-overlay" id="detailModal"><div class="modal">
    <div style="display:flex;justify-content:space-between"><span class="item-tag" id="detailBadge"></span><button class="btn-action" onclick="closeDetail()">✕</button></div>
    <h3 id="detailName"></h3><div class="author-row"><div class="author-avatar" id="detailAuthorAvatar"></div><div><span style="color:rgba(255,255,255,0.2);font-size:10px">author</span><br><span id="detailAuthor"></span></div></div>
    <div class="detail-grid"><div class="detail-item"><div class="detail-label">map</div><div id="detailMap"></div></div><div class="detail-item"><div class="detail-label">duration</div><div id="detailDuration"></div></div><div class="detail-item"><div class="detail-label">difficulty</div><div id="detailDifficulty"></div></div><div class="detail-item"><div class="detail-label">category</div><div id="detailCategory"></div></div></div>
    <div id="detailDescSection"><div class="detail-label">description</div><div id="detailDesc"></div></div>
    <div id="detailInstrSection"><div class="detail-label">instructions</div><div class="instructions-box" id="detailInstr"></div></div>
    <div class="modal-buttons"><button class="btn-action btn-green" onclick="shareTraining()">code</button><button class="btn-action btn-danger" onclick="deleteTraining()">delete</button><button class="btn-action" onclick="editTraining()">edit</button></div>
</div></div>
<div class="modal-overlay" id="formModal"><div class="modal">
    <h3 id="modalTitle">new training</h3><input type="hidden" id="editId">
    <div class="form-group"><label>name</label><input id="trainName"></div>
    <div class="form-group"><label>category</label><select id="trainCat"><option value="aim">aim</option><option value="movement">movement</option><option value="grenades">grenades</option><option value="tactics">tactics</option></select></div>
    <div class="form-group"><label>map</label><select id="trainMap"><option value="">none</option><option>Mirage</option><option>Inferno</option><option>Nuke</option><option>Overpass</option><option>Vertigo</option><option>Ancient</option><option>Anubis</option><option>Aim Map</option></select></div>
    <div class="form-group"><label>duration (min)</label><input type="number" id="trainDur" value="15"></div>
    <div class="form-group"><label>difficulty</label><div class="radio-row"><label><input type="radio" name="diff" value="easy"><span>easy</span></label><label><input type="radio" name="diff" value="medium" checked><span>medium</span></label><label><input type="radio" name="diff" value="hard"><span>hard</span></label></div></div>
    <div class="form-group"><label>description</label><textarea id="trainDesc" rows="2"></textarea></div>
    <div class="form-group"><label>instructions</label><textarea id="trainInstr" rows="3"></textarea></div>
    <div class="modal-buttons"><button class="btn-action" onclick="closeForm()">cancel</button><button class="btn-action btn-primary" onclick="saveTraining()">save</button></div>
</div></div>
<div class="modal-overlay" id="shareModal"><div class="modal" style="text-align:center"><h3>share code</h3><div class="code-block" id="shareCode" onclick="copyCode()"></div><div class="modal-buttons" style="justify-content:center"><button class="btn-action btn-primary" onclick="copyCode()">copy</button><button class="btn-action" onclick="closeShare()">close</button></div></div></div>
<div class="modal-overlay" id="codeModal"><div class="modal" style="text-align:center"><h3>import code</h3><textarea id="codeInput" style="width:100%;padding:14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:12px;color:#fff;font-size:13px;min-height:100px;text-align:center;font-family:monospace;outline:none"></textarea><div class="modal-buttons"><button class="btn-action btn-primary" onclick="addByCode()">import</button><button class="btn-action" onclick="closeCodeModal()">cancel</button></div></div></div>
<div class="modal-overlay" id="deleteModal"><div class="modal" style="text-align:center"><h3>delete?</h3><p style="color:#f55" id="deleteNameText"></p><div class="modal-buttons" style="justify-content:center"><button class="btn-action" onclick="closeDelete()">cancel</button><button class="btn-action btn-danger" onclick="confirmDelete()">delete</button></div></div></div>

<script>
var SHEET_ID='1o8H-zdNW7CSTJnSqfDZgLO2cmiyKwTAryikZsx28NPc';
var API_KEY='AIzaSyAWFHg6VpJXFQXH9HjPtTLvWNqmk9vXyOk';
var SHEET_URL='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/';
var ADMIN_LOGIN='p1en0101',ADMIN_PASS='nep1en112201';
var U='',A=false,CP='main',T=[],INV=[],I=null,S='';
var CN={aim:'aim',movement:'move',grenades:'nades',tactics:'tac'};
var DN={easy:'easy',medium:'med',hard:'hard'};
var BG={aim:'tag-aim',movement:'tag-movement',grenades:'tag-grenades',tactics:'tag-tactics'};

async function apiGet(s,r){var u=SHEET_URL+s+'!'+r+'?key='+API_KEY;var d=await(await fetch(u)).json();return d.values||[]}
async function apiAppend(s,row){var u=SHEET_URL+s+'!A:A:append?valueInputOption=RAW&key='+API_KEY+'&insertDataOption=INSERT_ROWS';await fetch(u,{method:'POST',body:JSON.stringify({values:[row]})})}

async function loadAll(){await Promise.all([loadUsers(),loadTrainings(),loadInvites(),loadBroadcast()])}
async function loadUsers(){var r=await apiGet('users','A2:B');localStorage.setItem('p1enhub_users',JSON.stringify(r))}
async function loadTrainings(){var r=await apiGet('trainings','A2:H');T=r.map(function(x,i){return{id:'t'+i,name:x[0]||'',category:x[1]||'aim',map:x[2]||'',duration:parseInt(x[3])||15,difficulty:x[4]||'medium',description:x[5]||'',instructions:x[6]||'',author:x[7]||''}});showList()}
async function loadInvites(){var r=await apiGet('invites','A2:D');INV=r.map(function(x,i){return{id:'inv'+i,from:x[0]||'',to:x[1]||'',status:x[2]||'pending',created:x[3]||''}});if(CP==='invites')renderInvites();checkNotif()}
async function loadBroadcast(){var r=await apiGet('broadcasts','A2:A');if(r.length>0){var c=document.getElementById('msgCard');c.style.display='block';c.style.animation='none';c.offsetHeight;c.style.animation='msgSlide 0.5s cubic-bezier(0.4,0,0.2,1)';document.getElementById('msgText').textContent=r[r.length-1][0]}}

function showLogin(){document.getElementById('loginScreen').style.display='block';document.getElementById('adminScreen').style.display='none'}
function showAdmin(){document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block'}
async function register(){var n=document.getElementById('nickInput').value.trim(),p=document.getElementById('passInput').value.trim();if(!n||n.length<2||!p||p.length<3){alert('Nick 2+, Pass 3+');return}var u=JSON.parse(localStorage.getItem('p1enhub_users')||'[]');if(u.find(function(x){return x[0]===n})){alert('Taken');return}await apiAppend('users',[n,p]);alert('Created! Login now')}
async function doLogin(){var n=document.getElementById('nickInput').value.trim(),p=document.getElementById('passInput').value.trim();if(!n||n.length<2){alert('Enter nick');return}var u=JSON.parse(localStorage.getItem('p1enhub_users')||'[]');var usr=u.find(function(x){return x[0]===n});if(usr&&usr[1]!==p){alert('Wrong password');return}enterApp(n,false)}
function doAdminLogin(){var l=document.getElementById('adminLoginInput').value.trim(),p=document.getElementById('adminPassInput').value.trim();if(l===ADMIN_LOGIN&&p===ADMIN_PASS)enterApp('ADMIN',true);else alert('Wrong')}
function enterApp(name,admin){U=name;A=admin;localStorage.setItem('p1enhub_user',name);if(admin)localStorage.setItem('p1enhub_admin','1');document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='none';document.getElementById('appScreen').style.display='block';document.getElementById('userNameDisplay').textContent=name;document.getElementById('userDot').className='dot'+(admin?' admin-dot':'');document.getElementById('adminBadge').style.display=admin?'inline-block':'none';document.getElementById('adminPanel').style.display=admin?'block':'none';document.getElementById('sendInviteCard').style.display=admin?'block':'none';showPage('main');loadAll();setInterval(loadAll,10000)}
function logout(){U='';A=false;localStorage.removeItem('p1enhub_user');localStorage.removeItem('p1enhub_admin');document.getElementById('appScreen').style.display='none';document.getElementById('loginScreen').style.display='block'}
function showPage(p){CP=p;document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});document.getElementById(p+'Page').classList.add('active');document.getElementById('backBtn').style.display=p==='main'?'none':'inline-block';if(p==='invites')renderInvites()}

function showList(){var l=document.getElementById('list'),e=document.getElementById('empty'),s=document.getElementById('search').value.toLowerCase();var f=T;if(s)f=T.filter(function(t){return t.name.toLowerCase().indexOf(s)!==-1});if(f.length===0){l.innerHTML='';e.style.display='block';return}e.style.display='none';l.innerHTML=f.map(function(t){return'<div class="item" onclick="openDetail(\''+t.id+'\')"><div class="item-top"><div class="item-name">'+t.name+'</div><div class="item-tag '+(BG[t.category]||'')+'">'+(CN[t.category]||'')+'</div></div><div class="item-meta"><span>'+(t.map||'—')+'</span><span>·</span><span>'+t.duration+'m</span><span>·</span><span>'+(DN[t.difficulty]||'')+'</span></div><div class="item-author">'+(t.author||'')+'</div></div>'}).join('')}
function openDetail(id){var t=T.find(function(x){return x.id===id});if(!t)return;I=t;S=encode(t);document.getElementById('detailName').textContent=t.name;document.getElementById('detailBadge').textContent=CN[t.category]||'';document.getElementById('detailBadge').className='item-tag '+(BG[t.category]||'');document.getElementById('detailMap').textContent=t.map||'—';document.getElementById('detailDuration').textContent=t.duration+' min';document.getElementById('detailDifficulty').textContent=DN[t.difficulty]||'';document.getElementById('detailCategory').textContent=CN[t.category]||'';document.getElementById('detailDesc').textContent=t.description||'—';document.getElementById('detailInstr').textContent=t.instructions||'—';document.getElementById('detailAuthor').textContent=t.author||'?';document.getElementById('detailAuthorAvatar').textContent=(t.author||'?')[0];document.getElementById('detailModal').style.display='flex'}
function closeDetail(){document.getElementById('detailModal').style.display='none'}
function shareTraining(){closeDetail();document.getElementById('shareCode').textContent=S;document.getElementById('shareModal').style.display='flex'}
function closeShare(){document.getElementById('shareModal').style.display='none'}
function copyCode(){navigator.clipboard.writeText(S).then(function(){alert('Copied!')})}
function deleteTraining(){document.getElementById('deleteNameText').textContent=I.name;document.getElementById('deleteModal').style.display='flex'}
function editTraining(){closeDetail();openForm(I)}
function openForm(td){if(td){document.getElementById('modalTitle').textContent='edit';document.getElementById('editId').value=td.id;document.getElementById('trainName').value=td.name;document.getElementById('trainCat').value=td.category;document.getElementById('trainMap').value=td.map||'';document.getElementById('trainDur').value=td.duration;document.getElementById('trainDesc').value=td.description||'';document.getElementById('trainInstr').value=td.instructions||'';var r=document.getElementsByName('diff');for(var i=0;i<r.length;i++){if(r[i].value===td.difficulty)r[i].checked=true}}else{document.getElementById('modalTitle').textContent='new';document.getElementById('editId').value='';document.getElementById('trainName').value='';document.getElementById('trainCat').value='aim';document.getElementById('trainMap').value='';document.getElementById('trainDur').value='15';document.getElementById('trainDesc').value='';document.getElementById('trainInstr').value='';document.getElementsByName('diff')[1].checked=true}document.getElementById('formModal').style.display='flex'}
async function saveTraining(){var d=[document.getElementById('trainName').value.trim(),document.getElementById('trainCat').value,document.getElementById('trainMap').value,parseInt(document.getElementById('trainDur').value),document.querySelector('input[name="diff"]:checked').value,document.getElementById('trainDesc').value.trim(),document.getElementById('trainInstr').value.trim(),A?'ADMIN':U];if(!d[0]){alert('Name required');return}await apiAppend('trainings',d);closeForm();loadTrainings()}
function closeForm(){document.getElementById('formModal').style.display='none'}
function confirmDelete(){alert('Delete row in Google Sheet');document.getElementById('deleteModal').style.display='none'}
function closeDelete(){document.getElementById('deleteModal').style.display='none'}
function encode(td){return'P1EN:'+btoa(unescape(encodeURIComponent(JSON.stringify({n:td.name,c:td.category,m:td.map,d:td.duration,f:td.difficulty,e:td.description,i:td.instructions,a:td.author||U}))))}
function decode(s){try{s=s.trim();if(s.indexOf('P1EN:')!==0)return null;s=s.replace('P1EN:','');var d=JSON.parse(decodeURIComponent(escape(atob(s))));return[d.n,d.c,d.m,d.d,d.f,d.e,d.i,d.a]}catch(e){return null}}
function openCodeModal(){document.getElementById('codeInput').value='';document.getElementById('codeModal').style.display='flex'}
function closeCodeModal(){document.getElementById('codeModal').style.display='none'}
async function addByCode(){var c=document.getElementById('codeInput').value.trim();if(!c){alert('Paste code');return}var t=decode(c);if(!t){alert('Invalid');return}await apiAppend('trainings',t);closeCodeModal();loadTrainings()}

async function sendInvite(){var to=document.getElementById('inviteNickInput').value.trim();if(!to||to===U){alert('Nick');return}await apiAppend('invites',[U,to,'pending',new Date().toLocaleString()]);document.getElementById('inviteNickInput').value='';loadInvites()}
function renderInvites(){var c=document.getElementById('inviteList');if(INV.length===0){c.innerHTML='<div class="no-data">empty</div>';return}c.innerHTML=INV.map(function(inv){return'<div class="invite-item"><span>'+(A?inv.to:inv.from)+'</span><span class="status-'+inv.status+'">'+inv.status+'</span></div>'}).join('')}
function checkNotif(){if(A||!U)return;var badge=document.getElementById('notifBadge');var pending=INV.filter(function(inv){return inv.to===U&&inv.status==='pending'});if(pending.length>0){badge.style.display='inline-block';badge.textContent='📨 '+pending.length;badge.style.animation='none';badge.offsetHeight;badge.style.animation='notifBounce 0.6s cubic-bezier(0.68,-0.55,0.27,1.55), notifGlow 1.5s infinite'}else{badge.style.display='none'}}
async function sendBroadcast(){var t=prompt('Message:');if(t){await apiAppend('broadcasts',[t]);loadBroadcast()}}

document.onkeydown=function(e){if(e.key==='Escape'){closeForm();closeDelete();closeDetail();closeShare();closeCodeModal()}};
(function(){var u=localStorage.getItem('p1enhub_user');var a=localStorage.getItem('p1enhub_admin');if(u){if(a==='1')enterApp('ADMIN',true);else enterApp(u,false)}})();
</script>
</body>
</html>

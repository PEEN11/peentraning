<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P1EN HUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#06060d;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 20%,rgba(255,107,53,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(100,200,255,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
        .app{width:100%;max-width:650px;position:relative;z-index:1}
        .card{background:rgba(255,255,255,0.02);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.05);border-radius:28px;padding:50px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
        .logo-text{font-size:44px;font-weight:200;letter-spacing:14px;color:#fff;text-shadow:0 0 40px rgba(255,107,53,0.3);margin-bottom:6px}
        .logo-text b{font-weight:600;color:#ff6b35;text-shadow:0 0 30px rgba(255,107,53,0.6)}
        .sub-text{font-size:11px;letter-spacing:8px;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-bottom:30px}
        .input-field{width:100%;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:12px;transition:all 0.4s}
        .input-field:focus{border-color:rgba(255,107,53,0.4);box-shadow:0 0 30px rgba(255,107,53,0.1)}
        .btn-main{width:100%;padding:15px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:#fff;font-size:15px;cursor:pointer;margin-bottom:8px;transition:all 0.3s}
        .btn-main:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.4)}
        .btn-main:active{transform:scale(0.95)}
        .btn-admin{border-color:rgba(255,107,53,0.2);color:#ff6b35;background:rgba(255,107,53,0.03)}
        .link-text{font-size:12px;color:rgba(255,255,255,0.15);cursor:pointer;background:none;border:none;display:block;margin:12px auto 0}.link-text:hover{color:rgba(255,255,255,0.5)}
        .main-screen{display:none}
        .header-row{display:flex;justify-content:space-between;align-items:center;padding:20px 0 15px}
        .logo-small{font-size:34px;font-weight:200;letter-spacing:10px}.logo-small b{font-weight:600;color:#ff6b35}
        .sub-small{font-size:9px;letter-spacing:6px;color:rgba(255,255,255,0.2)}
        .user-info{display:flex;align-items:center;gap:10px;font-size:13px}
        .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2)}.dot.admin-dot{background:#ff6b35;box-shadow:0 0 15px rgba(255,107,53,0.5)}
        .user-name{color:#fff;font-weight:500}
        .btn-logout{color:rgba(255,255,255,0.15);cursor:pointer;background:none;border:none;font-size:12px}.btn-logout:hover{color:#f55}
        .badge-admin{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(255,107,53,0.1);color:#ff6b35;border:1px solid rgba(255,107,53,0.2);display:none}
        .notif-badge{background:linear-gradient(135deg,#f55,#ff2020);color:#fff;font-size:10px;padding:4px 10px;border-radius:14px;cursor:pointer;display:none;animation:notifBounce 0.6s cubic-bezier(0.68,-0.55,0.27,1.55),notifGlow 1.5s infinite;box-shadow:0 0 20px rgba(255,30,30,0.5)}
        @keyframes notifBounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
        @keyframes notifGlow{0%,100%{box-shadow:0 0 15px rgba(255,30,30,0.5)}50%{box-shadow:0 0 30px rgba(255,30,30,0.9)}}
        .nav-tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,0.015);border-radius:14px;padding:4px}
        .nav-tab{flex:1;padding:10px;text-align:center;font-size:11px;cursor:pointer;border-radius:11px;color:rgba(255,255,255,0.3);transition:all 0.3s;letter-spacing:1px;text-transform:uppercase;font-weight:500;background:transparent;border:none}
        .nav-tab:hover{color:rgba(255,255,255,0.6)}
        .nav-tab.active{background:rgba(255,255,255,0.04);color:#fff}
        .badge-count{background:#f55;color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:5px;display:none}
        .msg-card{background:rgba(255,180,30,0.04);border:1px solid rgba(255,180,30,0.15);border-radius:16px;padding:16px;margin-bottom:15px;display:none;animation:msgSlide 0.5s cubic-bezier(0.4,0,0.2,1)}
        @keyframes msgSlide{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
        .msg-text{color:#fc3;font-size:13px}
        .panel-admin{background:rgba(255,107,53,0.02);border:1px solid rgba(255,107,53,0.15);border-radius:20px;padding:20px;margin-bottom:15px;display:none}
        .panel-title{font-size:10px;text-transform:uppercase;letter-spacing:4px;color:#ff6b35;margin-bottom:14px;font-weight:600}
        .panel-actions{display:flex;gap:8px;flex-wrap:wrap}
        .btn-panel{padding:9px 16px;border:1px solid rgba(255,107,53,0.15);border-radius:12px;font-size:11px;cursor:pointer;background:rgba(255,107,53,0.03);color:#ff6b35;transition:all 0.3s}
        .btn-panel:hover{background:rgba(255,107,53,0.08);transform:translateY(-2px)}.btn-panel:active{transform:scale(0.93)}
        .page{display:none}.page.active{display:block}
        .notif-list{display:flex;flex-direction:column;gap:8px}
        .notif-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:14px;animation:itemIn 0.4s ease}
        @keyframes itemIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        .notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .notif-icon.invite{background:rgba(100,200,255,0.1);color:#6cf}.notif-icon.system{background:rgba(255,200,50,0.1);color:#fc3}
        .notif-body{flex:1}.notif-title{font-size:13px;font-weight:500;margin-bottom:2px}.notif-desc{font-size:11px;color:rgba(255,255,255,0.3)}.notif-time{font-size:10px;color:rgba(255,255,255,0.15)}
        .notif-actions{display:flex;gap:5px}.notif-accept,.notif-decline{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;border:1px solid}.notif-accept{border-color:rgba(100,200,100,0.3);color:#6c6;background:rgba(100,200,100,0.1)}.notif-decline{border-color:rgba(255,80,80,0.3);color:#f55;background:rgba(255,80,80,0.1)}
        .team-list{display:flex;flex-direction:column;gap:8px}
        .team-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:14px}
        .team-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
        .team-info{flex:1}.team-name{font-size:14px;font-weight:500}.team-role{font-size:10px;color:rgba(255,255,255,0.3)}
        .team-status{font-size:9px;padding:3px 8px;border-radius:8px}.team-status.online{background:rgba(100,200,100,0.1);color:#6c6;border:1px solid rgba(100,200,100,0.2)}.team-status.offline{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3)}
        .rating-list{display:flex;flex-direction:column;gap:6px}
        .rating-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:14px}
        .rating-pos{font-size:14px;font-weight:700;color:rgba(255,255,255,0.3);width:28px;text-align:center}
        .rating-pos.top1{color:#fc3}.rating-pos.top2{color:#ccc}.rating-pos.top3{color:#c96}
        .rating-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
        .rating-info{flex:1}.rating-name{font-size:13px;font-weight:500}.rating-stats{font-size:10px;color:rgba(255,255,255,0.25)}
        .rating-score{font-size:14px;font-weight:600;color:#ff6b35}
        .search-box{position:relative;margin-bottom:15px}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.15)}
        .search-input{width:100%;padding:14px 16px 14px 44px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:16px;color:#fff;font-size:14px;outline:none}
        .btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
        .btn-action{padding:12px 24px;border:1px solid rgba(255,255,255,0.06);border-radius:14px;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.02);color:#fff;transition:all 0.3s}
        .btn-action:hover{background:rgba(255,255,255,0.05);transform:translateY(-2px)}.btn-action:active{transform:scale(0.93)}
        .btn-primary{background:rgba(255,255,255,0.04)}.btn-danger{color:#f55;border-color:rgba(255,80,80,0.1)}.btn-green{color:#6c6;border-color:rgba(100,200,100,0.1)}
        .list{display:flex;flex-direction:column;gap:10px}
        .item{background:rgba(255,255,255,0.012);border:1px solid rgba(255,255,255,0.03);border-radius:18px;padding:20px 24px;cursor:pointer;transition:all 0.4s}
        .item:hover{background:rgba(255,255,255,0.025);transform:translateY(-2px)}
        .item-top{display:flex;justify-content:space-between;margin-bottom:10px}.item-name{font-size:16px;font-weight:500}
        .item-tag{font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid}
        .tag-aim{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4)}.tag-movement{border-color:rgba(100,180,255,0.2);color:rgba(100,180,255,0.5)}.tag-grenades{border-color:rgba(100,220,150,0.2);color:rgba(100,220,150,0.5)}.tag-tactics{border-color:rgba(200,150,255,0.2);color:rgba(200,150,255,0.5)}
        .item-meta{display:flex;gap:15px;font-size:11px;color:rgba(255,255,255,0.25)}.item-author{font-size:9px;color:rgba(255,255,255,0.08);text-align:right;margin-top:4px}
        .empty{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:22px;padding:60px;text-align:center}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);justify-content:center;align-items:center;z-index:100;padding:20px}
        .modal{background:rgba(18,18,28,0.95);border:1px solid rgba(255,255,255,0.05);border-radius:28px;padding:35px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:modalIn 0.4s ease}
        @keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .form-group{margin-bottom:18px}.form-group label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:6px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:12px;color:#fff;font-size:14px;outline:none;font-family:inherit}
        .form-group textarea{resize:vertical;min-height:70px}.form-group select option{background:#1a1a25;color:#fff}
        .radio-row{display:flex;gap:8px}.radio-row input{display:none}.radio-row span{display:block;text-align:center;padding:10px;border:1px solid rgba(255,255,255,0.04);border-radius:10px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.3)}.radio-row input:checked+span{border-color:rgba(255,255,255,0.2);color:#fff}
        .modal-buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:25px}
        .code-block{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:18px;text-align:center;font-size:12px;color:rgba(255,255,255,0.4);word-break:break-all;cursor:pointer;font-family:monospace}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
        .detail-item{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:12px;padding:14px}
        .detail-label{font-size:8px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
        .author-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding:12px;background:rgba(255,255,255,0.01);border-radius:12px}
        .author-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,107,53,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:#ff6b35}
        .instructions-box{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);border-radius:12px;padding:16px;white-space:pre-line;line-height:1.8;color:rgba(255,255,255,0.4);font-size:13px}
        .invite-card{background:rgba(100,200,255,0.02);border:1px solid rgba(100,200,255,0.08);border-radius:20px;padding:22px;margin-bottom:15px}
        .invite-title{font-size:13px;color:#6cf;margin-bottom:16px;font-weight:500}
        .invite-input{width:100%;padding:11px;background:rgba(255,255,255,0.02);border:1px solid rgba(100,200,255,0.1);border-radius:10px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:10px}
        .invite-btn{width:100%;padding:11px;background:rgba(100,200,255,0.06);border:1px solid rgba(100,200,255,0.15);border-radius:10px;color:#6cf;font-size:13px;cursor:pointer}
        .invite-btn:hover{background:rgba(100,200,255,0.12)}
    </style>
</head>
<body>
<div class="app">
    <!-- ВХОД -->
    <div class="card" id="loginScreen">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text">training system</div>
        <input class="input-field" id="nickInput" placeholder="nickname" maxlength="20" autocomplete="off">
        <input class="input-field" id="passInput" type="password" placeholder="password">
        <button class="btn-main" onclick="doLogin()">enter</button>
        <button class="btn-main btn-admin" onclick="showAdmin()">admin</button>
        <button class="link-text" onclick="register()">create account</button>
    </div>
    <!-- АДМИН -->
    <div class="card" id="adminScreen" style="display:none">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text" style="color:#ff6b35">admin</div>
        <input class="input-field" id="adminLoginInput" placeholder="login">
        <input class="input-field" id="adminPassInput" type="password" placeholder="password">
        <button class="btn-main btn-admin" onclick="doAdminLogin()">enter</button>
        <button class="link-text" onclick="showLogin()">← back</button>
    </div>
    <!-- ГЛАВНАЯ -->
    <div class="main-screen" id="appScreen">
        <div class="header-row">
            <div><div class="logo-small">P<b>1</b>EN HUB</div><div class="sub-small">training system</div></div>
            <div class="user-info">
                <span class="dot" id="userDot"></span><span class="user-name" id="userNameDisplay"></span>
                <span class="badge-admin" id="adminBadge">ADMIN</span>
                <button class="btn-logout" onclick="logout()">exit</button>
            </div>
        </div>
        <div class="msg-card" id="msgCard"><div class="msg-text" id="msgText"></div></div>
        <div class="panel-admin" id="adminPanel">
            <div class="panel-title">admin controls</div>
            <div class="panel-actions">
                <button class="btn-panel" onclick="sendBroadcast()">📢 broadcast</button>
            </div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('trainings',this)">📦 Trainings</button>
            <button class="nav-tab" onclick="switchTab('notifications',this)">🔔 Notifs <span class="badge-count" id="notifCount">0</span></button>
            <button class="nav-tab" onclick="switchTab('team',this)">👥 Team</button>
            <button class="nav-tab" onclick="switchTab('rating',this)">🏆 Rating</button>
        </div>
        <div class="page active" id="trainingsPage">
            <div class="search-box"><span class="search-icon">⌕</span><input class="search-input" id="search" placeholder="search..." oninput="showList()"></div>
            <div class="btn-row"><button class="btn-action btn-primary" onclick="openForm()">+ training</button><button class="btn-action" onclick="openCodeModal()">import</button></div>
            <div class="list" id="list"></div>
            <div class="empty" id="empty"><div style="font-size:40px;opacity:0.2">○</div><div style="color:rgba(255,255,255,0.2)">no trainings</div></div>
        </div>
        <div class="page" id="notificationsPage">
            <div class="invite-card" id="sendInviteCard" style="display:none">
                <div class="invite-title">👥 invite player</div>
                <input class="invite-input" id="inviteNickInput" placeholder="nickname">
                <button class="invite-btn" onclick="sendInvite()">📨 send invite</button>
            </div>
            <div class="notif-list" id="notifList"></div>
        </div>
        <div class="page" id="teamPage"><div class="team-list" id="teamList"></div></div>
        <div class="page" id="ratingPage"><div class="rating-list" id="ratingList"></div></div>
    </div>
</div>
<!-- МОДАЛКИ -->
<div class="modal-overlay" id="detailModal"><div class="modal">
    <div style="display:flex;justify-content:space-between"><span class="item-tag" id="detailBadge"></span><button class="btn-action" onclick="closeDetail()">✕</button></div>
    <h3 id="detailName"></h3><div class="author-row"><div class="author-avatar" id="detailAuthorAvatar"></div><div><span style="color:rgba(255,255,255,0.2);font-size:10px">author</span><br><span id="detailAuthor"></span></div></div>
    <div class="detail-grid"><div class="detail-item"><div class="detail-label">map</div><div id="detailMap"></div></div><div class="detail-item"><div class="detail-label">duration</div><div id="detailDuration"></div></div><div class="detail-item"><div class="detail-label">difficulty</div><div id="detailDifficulty"></div></div><div class="detail-item"><div class="detail-label">category</div><div id="detailCategory"></div></div></div>
    <div id="detailDescSection"><div class="detail-label">description</div><div id="detailDesc"></div></div>
    <div id="detailInstrSection"><div class="detail-label">instructions</div><div class="instructions-box" id="detailInstr"></div></div>
    <div class="modal-buttons"><button class="btn-action btn-green" onclick="shareTraining()">code</button><button class="btn-action btn-danger" onclick="deleteTraining()">delete</button><button class="btn-action" onclick="editTraining()">edit</button></div>
</div></div>
<div class="modal-overlay" id="formModal"><div class="modal">
    <h3 id="modalTitle">new training</h3><input type="hidden" id="editId">
    <div class="form-group"><label>name</label><input id="trainName"></div>
    <div class="form-group"><label>category</label><select id="trainCat"><option value="aim">aim</option><option value="movement">movement</option><option value="grenades">grenades</option><option value="tactics">tactics</option></select></div>
    <div class="form-group"><label>map</label><select id="trainMap"><option value="">none</option><option>Mirage</option><option>Inferno</option><option>Nuke</option><option>Overpass</option><option>Vertigo</option><option>Ancient</option><option>Anubis</option><option>Aim Map</option></select></div>
    <div class="form-group"><label>duration</label><input type="number" id="trainDur" value="15"></div>
    <div class="form-group"><label>difficulty</label><div class="radio-row"><label><input type="radio" name="diff" value="easy"><span>easy</span></label><label><input type="radio" name="diff" value="medium" checked><span>medium</span></label><label><input type="radio" name="diff" value="hard"><span>hard</span></label></div></div>
    <div class="form-group"><label>description</label><textarea id="trainDesc" rows="2"></textarea></div>
    <div class="form-group"><label>instructions</label><textarea id="trainInstr" rows="3"></textarea></div>
    <div class="modal-buttons"><button class="btn-action" onclick="closeForm()">cancel</button><button class="btn-action btn-primary" onclick="saveTraining()">save</button></div>
</div></div>
<div class="modal-overlay" id="shareModal"><div class="modal" style="text-align:center"><h3>code</h3><div class="code-block" id="shareCode" onclick="copyCode()"></div><div class="modal-buttons" style="justify-content:center"><button class="btn-action btn-primary" onclick="copyCode()">copy</button><button class="btn-action" onclick="closeShare()">close</button></div></div></div>
<div class="modal-overlay" id="codeModal"><div class="modal" style="text-align:center"><h3>import</h3><textarea id="codeInput" style="width:100%;padding:14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:12px;color:#fff;font-size:13px;min-height:100px;text-align:center;font-family:monospace;outline:none"></textarea><div class="modal-buttons"><button class="btn-action btn-primary" onclick="addByCode()">import</button><button class="btn-action" onclick="closeCodeModal()">cancel</button></div></div></div>
<div class="modal-overlay" id="deleteModal"><div class="modal" style="text-align:center"><h3>delete?</h3><p style="color:#f55" id="deleteNameText"></p><div class="modal-buttons" style="justify-content:center"><button class="btn-action" onclick="closeDelete()">cancel</button><button class="btn-action btn-danger" onclick="confirmDelete()">delete</button></div></div></div>

<script>
// ===== FIREBASE =====

// РЕГИСТРАЦИЯ ЧЕРЕЗ FIREBASE
async function register(){
    var n=document.getElementById('nickInput').value.trim();
    var p=document.getElementById('passInput').value.trim();
    if(!n||n.length<2||!p||p.length<3){alert('Nick 2+, Pass 3+');return}
    var doc=await db.collection('users').doc(n).get();
    if(doc.exists){alert('Nickname taken!');return}
    await db.collection('users').doc(n).set({pass:p,created:Date.now()});
    alert('Account created! You can now login.');
}

// ВХОД ЧЕРЕЗ FIREBASE
async function doLogin(){
    var n=document.getElementById('nickInput').value.trim();
    var p=document.getElementById('passInput').value.trim();
    if(!n||n.length<2){alert('Enter nickname');return}
    var doc=await db.collection('users').doc(n).get();
    if(!doc.exists){alert('Account not found. Create one first.');return}
    if(doc.data().pass!==p){alert('Wrong password!');return}
    enterApp(n,false);
}

function doAdminLogin(){
    if(document.getElementById('adminLoginInput').value==='p1en0101'&&document.getElementById('adminPassInput').value==='nep1en112201'){

}

function enterApp(name,admin){
    U=name;A=admin;localStorage.setItem('p1enhub_user',name);if(admin)localStorage.setItem('p1enhub_admin','1');

function logout(){U='';A=false;localStorage.removeItem('p1enhub_user');localStorage.removeItem('p1enhub_admin');document.getElementById('appScreen').style.display='none';document.getElementById('loginScreen').style.display='block'}

function switchTab(tab,btn){
    document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    btn.classList.add('active');document.getElementById(tab+'Page').classList.add('active');
}

// ===== ТРЕНИРОВКИ (FIREBASE) =====
function loadTrainings(){
    db.collection('trainings').orderBy('created','desc').onSnapshot(function(snap){
        T=[];snap.forEach(function(doc){T.push({id:doc.id,...doc.data()})});showList();
    });
}
function showList(){
    var l=document.getElementById('list'),e=document.getElementById('empty'),s=document.getElementById('search').value.toLowerCase();
    var f=T;if(s)f=T.filter(function(t){return t.name.toLowerCase().indexOf(s)!==-1});
    if(f.length===0){l.innerHTML='';e.style.display='block';return}
    e.style.display='none';l.innerHTML=f.map(function(t){return'<div class="item" onclick="openDetail(\''+t.id+'\')"><div class="item-top"><div class="item-name">'+t.name+'</div><div class="item-tag '+(BG[t.category]||'')+'">'+(CN[t.category]||'')+'</div></div><div class="item-meta"><span>'+(t.map||'—')+'</span><span>·</span><span>'+t.duration+'m</span><span>·</span><span>'+(DN[t.difficulty]||'')+'</span></div><div class="item-author">'+(t.author||'')+'</div></div>'}).join('');
}
function openDetail(id){var t=T.find(function(x){return x.id===id});if(!t)return;I=t;S=encode(t);document.getElementById('detailName').textContent=t.name;document.getElementById('detailBadge').textContent=CN[t.category]||'';document.getElementById('detailBadge').className='item-tag '+(BG[t.category]||'');document.getElementById('detailMap').textContent=t.map||'—';document.getElementById('detailDuration').textContent=t.duration+' min';document.getElementById('detailDifficulty').textContent=DN[t.difficulty]||'';document.getElementById('detailCategory').textContent=CN[t.category]||'';document.getElementById('detailDesc').textContent=t.description||'—';document.getElementById('detailInstr').textContent=t.instructions||'—';document.getElementById('detailAuthor').textContent=t.author||'?';document.getElementById('detailAuthorAvatar').textContent=(t.author||'?')[0];document.getElementById('detailModal').style.display='flex'}
function closeDetail(){document.getElementById('detailModal').style.display='none'}
function shareTraining(){closeDetail();document.getElementById('shareCode').textContent=S;document.getElementById('shareModal').style.display='flex'}
function closeShare(){document.getElementById('shareModal').style.display='none'}
function copyCode(){navigator.clipboard.writeText(S).then(function(){alert('Copied!')})}
function deleteTraining(){document.getElementById('deleteNameText').textContent=I.name;document.getElementById('deleteModal').style.display='flex'}
function editTraining(){closeDetail();openForm(I)}
function openForm(td){if(td){document.getElementById('modalTitle').textContent='edit';document.getElementById('editId').value=td.id;document.getElementById('trainName').value=td.name;document.getElementById('trainCat').value=td.category;document.getElementById('trainMap').value=td.map||'';document.getElementById('trainDur').value=td.duration;document.getElementById('trainDesc').value=td.description||'';document.getElementById('trainInstr').value=td.instructions||'';var r=document.getElementsByName('diff');for(var i=0;i<r.length;i++){if(r[i].value===td.difficulty)r[i].checked=true}}else{document.getElementById('modalTitle').textContent='new';document.getElementById('editId').value='';document.getElementById('trainName').value='';document.getElementById('trainCat').value='aim';document.getElementById('trainMap').value='';document.getElementById('trainDur').value='15';document.getElementById('trainDesc').value='';document.getElementById('trainInstr').value='';document.getElementsByName('diff')[1].checked=true}document.getElementById('formModal').style.display='flex'}
async function saveTraining(){
    var d={name:document.getElementById('trainName').value.trim(),category:document.getElementById('trainCat').value,map:document.getElementById('trainMap').value,duration:parseInt(document.getElementById('trainDur').value),difficulty:document.querySelector('input[name="diff"]:checked').value,description:document.getElementById('trainDesc').value.trim(),instructions:document.getElementById('trainInstr').value.trim(),author:A?'ADMIN':U,created:Date.now()};
    if(!d.name){alert('Name required');return}
    var id=document.getElementById('editId').value;
    if(id){await db.collection('trainings').doc(id).update(d)}else{await db.collection('trainings').add(d)}
    closeForm();
}
function closeForm(){document.getElementById('formModal').style.display='none'}
async function confirmDelete(){if(I){await db.collection('trainings').doc(I.id).delete()}document.getElementById('deleteModal').style.display='none'}
function closeDelete(){document.getElementById('deleteModal').style.display='none'}
function encode(td){return'P1EN:'+btoa(unescape(encodeURIComponent(JSON.stringify({n:td.name,c:td.category,m:td.map,d:td.duration,f:td.difficulty,e:td.description,i:td.instructions,a:td.author||U}))))}
function decode(s){try{s=s.trim();if(s.indexOf('P1EN:')!==0)return null;s=s.replace('P1EN:','');var d=JSON.parse(decodeURIComponent(escape(atob(s))));d.created=Date.now();return d}catch(e){return null}}
function openCodeModal(){document.getElementById('codeModal').style.display='flex'}
function closeCodeModal(){document.getElementById('codeModal').style.display='none'}
async function addByCode(){var c=document.getElementById('codeInput').value.trim();if(!c){alert('Paste code');return}var t=decode(c);if(!t){alert('Invalid code');return}await db.collection('trainings').add(t);closeCodeModal()}

// ===== ПРИГЛАШЕНИЯ (FIREBASE) =====
function loadInvites(){
    var q=A?db.collection('invites').orderBy('created','desc'):db.collection('invites').where('to','==',U).orderBy('created','desc');
    q.onSnapshot(function(snap){INV=[];snap.forEach(function(doc){INV.push({id:doc.id,...doc.data()})});if(document.getElementById('notificationsPage').classList.contains('active'))renderNotifs();updateBadge()});
}
function listenNotifs(){
    if(A)return;
    db.collection('invites').where('to','==',U).where('status','==','pending').onSnapshot(function(snap){
        var c=snap.size;var badge=document.getElementById('notifCount');
        if(c>0){badge.style.display='inline';badge.textContent=c}else{badge.style.display='none'}
    });
}
function updateBadge(){
    var c=INV.filter(function(inv){return inv.to===U&&inv.status==='pending'}).length;
    var badge=document.getElementById('notifCount');
    if(c>0){badge.style.display='inline';badge.textContent=c}else{badge.style.display='none'}
}
async function sendInvite(){
    var to=document.getElementById('inviteNickInput').value.trim();
    if(!to||to===U){alert('Enter valid nickname');return}
    await db.collection('invites').add({from:U,to:to,status:'pending',created:Date.now()});
    document.getElementById('inviteNickInput').value='';alert('Invite sent!');
}
async function respondInvite(id,status){await db.collection('invites').doc(id).update({status:status})}
function renderNotifs(){
    var c=document.getElementById('notifList');
    if(INV.length===0){c.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px">no notifications</div>';return}
    c.innerHTML=INV.map(function(inv){
        var actions='';
        if(!A&&inv.status==='pending')actions='<div class="notif-actions"><button class="notif-accept" onclick="respondInvite(\''+inv.id+'\',\'accepted\')">✓</button><button class="notif-decline" onclick="respondInvite(\''+inv.id+'\',\'declined\')">✕</button></div>';
        return'<div class="notif-item"><div class="notif-icon invite">👥</div><div class="notif-body"><div class="notif-title">Team invite</div><div class="notif-desc">'+(A?'To: '+inv.to:'From: '+inv.from)+'</div><div class="notif-time">'+new Date(inv.created).toLocaleString()+'</div></div>'+actions+'</div>';
    }).join('');
}

// ===== СООБЩЕНИЯ =====
function loadBroadcast(){
    db.collection('broadcasts').orderBy('created','desc').limit(1).onSnapshot(function(snap){
        if(snap.empty)return;
        var doc=snap.docs[0];var card=document.getElementById('msgCard');var msg=document.getElementById('msgText');
        card.style.display='block';msg.textContent=doc.data().text;
    });
}
async function sendBroadcast(){var t=prompt('Message to all users:');if(t){await db.collection('broadcasts').add({text:t,created:Date.now()})}}

// ===== КОМАНДА И РЕЙТИНГ =====
function renderTeam(){document.getElementById('teamList').innerHTML=teamData.map(function(m){return'<div class="team-item"><div class="team-avatar" style="background:'+m.color+'20;color:'+m.color+'">'+m.name[0].toUpperCase()+'</div><div class="team-info"><div class="team-name">'+m.name+'</div><div class="team-role">'+m.role+'</div></div><div class="team-status '+m.status+'">'+m.status+'</div></div>'}).join('')}
function renderRating(){document.getElementById('ratingList').innerHTML=ratingData.map(function(m,i){var p=i===0?'top1':i===1?'top2':i===2?'top3':'';return'<div class="rating-item"><div class="rating-pos '+p+'">'+(i+1)+'</div><div class="rating-avatar" style="background:'+m.color+'20;color:'+m.color+'">'+m.name[0].toUpperCase()+'</div><div class="rating-info"><div class="rating-name">'+m.name+'</div><div class="rating-stats">player</div></div><div class="rating-score">'+m.score+'</div></div>'}).join('')}

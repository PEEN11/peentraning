<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P1EN HUB</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#08080f;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px}
        .app{width:100%;max-width:600px}

        .btn-main{width:100%;padding:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-size:15px;cursor:pointer;margin-bottom:8px}
        .btn-main:hover{background:rgba(255,255,255,0.1)}
        .btn-admin{border-color:rgba(255,107,53,0.3);color:#ff6b35;background:rgba(255,107,53,0.05)}
        .link-text{font-size:12px;color:rgba(255,255,255,0.2);cursor:pointer;background:none;border:none;display:block;margin:10px auto 0}.link-text:hover{color:#fff}

        .user-info{display:flex;align-items:center;gap:8px;font-size:13px}

        .notif-badge{background:#f55;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;display:none;animation:blink 1s infinite}

        .panel-title{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:#ff6b35;margin-bottom:12px}
        .panel-actions{display:flex;gap:8px;flex-wrap:wrap}

        .btn-panel:hover{background:rgba(255,107,53,0.15)}
        .msg-card{background:rgba(255,200,50,0.05);border:1px solid rgba(255,200,50,0.15);border-radius:16px;padding:15px;margin-bottom:15px;display:none}
        .msg-text{color:#fc3;font-size:13px}

        .btn-refresh{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;margin-left:auto}
        .page{display:none}.page.active{display:block}

        .invite-title{font-size:13px;color:#6cf;margin-bottom:15px}

        .invite-btn{width:100%;padding:10px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.2);border-radius:8px;color:#6cf;font-size:13px;cursor:pointer}
        .invite-list{display:flex;flex-direction:column;gap:8px;margin-top:15px}
        .invite-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,0.02);border-radius:8px;font-size:12px}
        .status-pending{color:#fc3}.status-accepted{color:#6c6}.status-declined{color:#f55}
        .invite-actions{display:flex;gap:5px}.invite-accept,.invite-decline{padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;border:1px solid}.invite-accept{border-color:rgba(100,200,100,0.3);color:#6c6;background:rgba(100,200,100,0.1)}.invite-decline{border-color:rgba(255,80,80,0.3);color:#f55;background:rgba(255,80,80,0.1)}
        .no-data{text-align:center;color:rgba(255,255,255,0.2);font-size:12px;padding:15px}
        .search-box{position:relative;margin-bottom:15px}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2)}
        .search-input{width:100%;padding:14px 16px 14px 42px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px;color:#fff;font-size:14px;outline:none}
        .btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
        .btn-action{padding:12px 22px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.02);color:#fff}
        .btn-action:hover{background:rgba(255,255,255,0.06)}.btn-primary{background:rgba(255,255,255,0.06)}.btn-danger{color:#f55;border-color:rgba(255,80,80,0.15)}.btn-green{color:#6c6;border-color:rgba(100,200,100,0.15)}
        .list{display:flex;flex-direction:column;gap:10px}
        .item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:18px 22px;cursor:pointer}
        .item:hover{background:rgba(255,255,255,0.03)}.item-top{display:flex;justify-content:space-between;margin-bottom:10px}.item-name{font-size:16px;font-weight:500}
        .item-tag{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid}
        .tag-aim{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}.tag-movement{border-color:rgba(150,180,255,0.2);color:rgba(150,180,255,0.5)}.tag-grenades{border-color:rgba(150,255,180,0.2);color:rgba(150,255,180,0.5)}.tag-tactics{border-color:rgba(220,180,255,0.2);color:rgba(220,180,255,0.5)}
        .item-meta{display:flex;gap:15px;font-size:12px;color:rgba(255,255,255,0.3)}.item-author{font-size:10px;color:rgba(255,255,255,0.12);text-align:right}
        .empty{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:20px;padding:50px;text-align:center}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:100;padding:20px}
        .modal{background:rgba(20,20,28,0.95);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:30px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
        .form-group{margin-bottom:18px}.form-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:6px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:#fff;font-size:14px;outline:none;font-family:inherit}
        .form-group textarea{resize:vertical;min-height:70px}.form-group select option{background:#1a1a22;color:#fff}
        .radio-row{display:flex;gap:8px}.radio-row input{display:none}.radio-row span{display:block;text-align:center;padding:10px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.35)}.radio-row input:checked+span{border-color:#fff;color:#fff}
        .modal-buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:25px}
        .code-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px;text-align:center;font-size:12px;color:rgba(255,255,255,0.5);word-break:break-all;cursor:pointer;font-family:monospace}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
        .detail-item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:14px}
        .detail-label{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
        .author-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding:12px;background:rgba(255,255,255,0.015);border-radius:10px}
        .author-avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:11px}
        .instructions-box{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:16px;white-space:pre-line;line-height:1.7;color:rgba(255,255,255,0.5);font-size:13px}
    </style>
</head>
<body>
<div class="app">
    <!-- ВХОД -->
    <div class="card" id="loginScreen">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text">система тренировок</div>
        <input class="input-field" id="nickInput" placeholder="ваш ник" maxlength="20" autocomplete="off">
        <input class="input-field" id="passInput" type="password" placeholder="пароль (если есть)">
        <button class="btn-main" onclick="doLogin()">войти</button>
        <button class="btn-main btn-admin" onclick="showAdmin()">🔑 админ</button>
        <button class="link-text" onclick="register()">создать аккаунт</button>
    </div>

    <!-- АДМИН -->
    <div class="card" id="adminScreen" style="display:none">
        <div class="logo-text">P<b>1</b>EN HUB</div>
        <div class="sub-text" style="color:#ff6b35">админ</div>
        <input class="input-field" id="adminLoginInput" placeholder="логин">
        <input class="input-field" id="adminPassInput" type="password" placeholder="пароль">
        <button class="btn-main btn-admin" onclick="doAdminLogin()">войти</button>
        <button class="link-text" onclick="showLogin()">← назад</button>
    </div>

    <!-- ГЛАВНАЯ -->
    <div class="main-screen" id="appScreen">
        <div class="top-bar">
            <button class="btn-back" id="backBtn" onclick="showPage('main')">← назад</button>
            <span class="notif-badge" id="notifBadge" onclick="showPage('invites')"></span>
            <button class="btn-refresh" onclick="loadAll()">🔄</button>
        </div>
        <div class="page active" id="mainPage">
            <div class="header-row">
                <div><div class="logo-small">P<b>1</b>EN HUB</div><div class="sub-small">система тренировок</div></div>
                <div class="user-info">
                    <span class="dot" id="userDot"></span><span class="user-name" id="userNameDisplay"></span>
                    <span class="badge-admin" id="adminBadge">ADMIN</span>
                    <button class="btn-logout" onclick="logout()">выход</button>
                </div>
            </div>
            <div class="msg-card" id="msgCard"><div class="msg-text" id="msgText"></div></div>
            <div class="panel-admin" id="adminPanel">
                <div class="panel-title">🛡️ Админ</div>
                <div class="panel-actions">
                    <button class="btn-panel" onclick="showPage('invites')">👥 Приглашения</button>
                    <button class="btn-panel" onclick="sendBroadcast()">📢 Сообщение</button>
                </div>
            </div>
            <div class="search-box"><span class="search-icon">⌕</span><input class="search-input" id="search" placeholder="поиск..." oninput="showList()"></div>
            <div class="btn-row"><button class="btn-action btn-primary" onclick="openForm()">+ тренировка</button><button class="btn-action" onclick="openCodeModal()">импорт</button></div>
            <div class="list" id="list"></div>
            <div class="empty" id="empty"><div style="font-size:36px;opacity:0.3">○</div><div>нет тренировок</div></div>
        </div>
        <div class="page" id="invitesPage">
            <div class="invite-card" id="sendInviteCard" style="display:none">
                <div class="invite-title">👥 Пригласить</div>
                <input class="invite-input" id="inviteNickInput" placeholder="никнейм">
                <button class="invite-btn" onclick="sendInvite()">📨 Отправить</button>
            </div>
            <div class="invite-card">
                <div class="invite-title">📋 Приглашения</div>
                <div class="invite-list" id="inviteList"></div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛКИ -->
<div class="modal-overlay" id="detailModal"><div class="modal">
    <div style="display:flex;justify-content:space-between"><span class="item-tag" id="detailBadge"></span><button class="btn-action" onclick="closeDetail()">✕</button></div>
    <h3 id="detailName"></h3><div class="author-row"><div class="author-avatar" id="detailAuthorAvatar"></div><div><span style="color:rgba(255,255,255,0.3);font-size:11px">автор</span><br><span id="detailAuthor"></span></div></div>
    <div class="detail-grid"><div class="detail-item"><div class="detail-label">карта</div><div id="detailMap"></div></div><div class="detail-item"><div class="detail-label">длит</div><div id="detailDuration"></div></div><div class="detail-item"><div class="detail-label">сложн</div><div id="detailDifficulty"></div></div><div class="detail-item"><div class="detail-label">катег</div><div id="detailCategory"></div></div></div>
    <div id="detailDescSection"><div class="detail-label">описание</div><div id="detailDesc"></div></div>
    <div id="detailInstrSection"><div class="detail-label">инструкция</div><div class="instructions-box" id="detailInstr"></div></div>
    <div class="modal-buttons"><button class="btn-action btn-green" onclick="shareTraining()">код</button><button class="btn-action btn-danger" onclick="deleteTraining()">удалить</button><button class="btn-action" onclick="editTraining()">изменить</button></div>
</div></div>
<div class="modal-overlay" id="formModal"><div class="modal">
    <h3 id="modalTitle">новая</h3><input type="hidden" id="editId">
    <div class="form-group"><label>название</label><input id="trainName"></div>
    <div class="form-group"><label>категория</label><select id="trainCat"><option value="aim">аим</option><option value="movement">движение</option><option value="grenades">гранаты</option><option value="tactics">тактика</option></select></div>
    <div class="form-group"><label>карта</label><select id="trainMap"><option value="">нет</option><option>Mirage</option><option>Inferno</option><option>Nuke</option><option>Overpass</option><option>Vertigo</option><option>Ancient</option><option>Anubis</option><option>Aim Map</option></select></div>
    <div class="form-group"><label>длит (мин)</label><input type="number" id="trainDur" value="15"></div>
    <div class="form-group"><label>сложность</label><div class="radio-row"><label><input type="radio" name="diff" value="easy"><span>легкая</span></label><label><input type="radio" name="diff" value="medium" checked><span>средняя</span></label><label><input type="radio" name="diff" value="hard"><span>сложная</span></label></div></div>
    <div class="form-group"><label>описание</label><textarea id="trainDesc" rows="2"></textarea></div>
    <div class="form-group"><label>инструкция</label><textarea id="trainInstr" rows="3"></textarea></div>
    <div class="modal-buttons"><button class="btn-action" onclick="closeForm()">отмена</button><button class="btn-action btn-primary" onclick="saveTraining()">сохранить</button></div>
</div></div>
<div class="modal-overlay" id="shareModal"><div class="modal" style="text-align:center"><h3>код</h3><div class="code-block" id="shareCode" onclick="copyCode()"></div><div class="modal-buttons" style="justify-content:center"><button class="btn-action btn-primary" onclick="copyCode()">копировать</button><button class="btn-action" onclick="closeShare()">закрыть</button></div></div></div>
<div class="modal-overlay" id="codeModal"><div class="modal" style="text-align:center"><h3>импорт</h3><textarea id="codeInput" style="width:100%;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:#fff;font-size:13px;min-height:100px;text-align:center;font-family:monospace;outline:none"></textarea><div class="modal-buttons"><button class="btn-action btn-primary" onclick="addByCode()">импорт</button><button class="btn-action" onclick="closeCodeModal()">отмена</button></div></div></div>
<div class="modal-overlay" id="deleteModal"><div class="modal" style="text-align:center"><h3>удалить?</h3><p style="color:#f55" id="deleteNameText"></p><div class="modal-buttons" style="justify-content:center"><button class="btn-action" onclick="closeDelete()">отмена</button><button class="btn-action btn-danger" onclick="confirmDelete()">удалить</button></div></div></div>

<script>
// ===== НАСТРОЙКИ (твои данные) =====
var SHEET_ID='1o8H-zdNW7CSTJnSqfDZgLO2cmiyKwTAryikZsx28NPc';
var API_KEY='AIzaSyAWFHg6VpJXFQXH9HjPtTLvWNqmk9vXyOk';
var SHEET_URL='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/';
var ADMIN_LOGIN='p1en0101';
var ADMIN_PASS='nep1en112201';

// ===== ДАННЫЕ =====
var U='',A=false,CP='main',T=[],INV=[],I=null,S='';
var CN={aim:'аим',movement:'движение',grenades:'гранаты',tactics:'тактика'};
var DN={easy:'легкая',medium:'средняя',hard:'сложная'};
var BG={aim:'tag-aim',movement:'tag-movement',grenades:'tag-grenades',tactics:'tag-tactics'};

// ===== API =====
async function apiGet(sheet,range){
    var url=SHEET_URL+sheet+'!'+range+'?key='+API_KEY;
    var resp=await fetch(url);var data=await resp.json();
    return data.values||[];
}
async function apiAppend(sheet,row){
    var url=SHEET_URL+sheet+'!A:A:append?valueInputOption=RAW&key='+API_KEY+'&insertDataOption=INSERT_ROWS';
    await fetch(url,{method:'POST',body:JSON.stringify({values:[row]})});
}

// ===== ЗАГРУЗКА =====
async function loadAll(){
    await Promise.all([loadUsers(),loadTrainings(),loadInvites(),loadBroadcast()]);
}
async function loadUsers(){
    var rows=await apiGet('users','A2:B');
    localStorage.setItem('p1enhub_users',JSON.stringify(rows));
}
async function loadTrainings(){
    var rows=await apiGet('trainings','A2:H');
    T=rows.map(function(r,i){return{id:'t'+i,name:r[0]||'',category:r[1]||'aim',map:r[2]||'',duration:parseInt(r[3])||15,difficulty:r[4]||'medium',description:r[5]||'',instructions:r[6]||'',author:r[7]||''}});
    showList();
}
async function loadInvites(){
    var rows=await apiGet('invites','A2:D');
    INV=rows.map(function(r,i){return{id:'inv'+i,from:r[0]||'',to:r[1]||'',status:r[2]||'pending',created:r[3]||''}});
    if(CP==='invites')renderInvites();
    checkNotif();
}
async function loadBroadcast(){
    var rows=await apiGet('broadcasts','A2:A');
    if(rows.length>0){document.getElementById('msgCard').style.display='block';document.getElementById('msgText').textContent=rows[rows.length-1][0]}
}

// ===== АВТОРИЗАЦИЯ =====
function showLogin(){document.getElementById('loginScreen').style.display='block';document.getElementById('adminScreen').style.display='none'}
function showAdmin(){document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block'}
async function register(){
    var n=document.getElementById('nickInput').value.trim(),p=document.getElementById('passInput').value.trim();
    if(!n||n.length<2||!p||p.length<3){alert('Ник от 2, пароль от 3');return}
    var users=JSON.parse(localStorage.getItem('p1enhub_users')||'[]');
    if(users.find(function(u){return u[0]===n})){alert('Занят');return}
    await apiAppend('users',[n,p]);alert('Создан! Войдите');
}
async function doLogin(){
    var n=document.getElementById('nickInput').value.trim(),p=document.getElementById('passInput').value.trim();
    if(!n||n.length<2){alert('Введите ник');return}
    var users=JSON.parse(localStorage.getItem('p1enhub_users')||'[]');
    var user=users.find(function(u){return u[0]===n});
    if(user&&user[1]!==p){alert('Неверный пароль');return}
    enterApp(n,false);
}
function doAdminLogin(){
    var l=document.getElementById('adminLoginInput').value.trim(),p=document.getElementById('adminPassInput').value.trim();
    if(l===ADMIN_LOGIN&&p===ADMIN_PASS)enterApp('ADMIN',true);
    else alert('Неверно');
}
function enterApp(name,admin){
    U=name;A=admin;localStorage.setItem('p1enhub_user',name);if(admin)localStorage.setItem('p1enhub_admin','1');
    document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';document.getElementById('userNameDisplay').textContent=name;
    document.getElementById('userDot').className='dot'+(admin?' admin-dot':'');
    document.getElementById('adminBadge').style.display=admin?'inline-block':'none';
    document.getElementById('adminPanel').style.display=admin?'block':'none';
    document.getElementById('sendInviteCard').style.display=admin?'block':'none';
    showPage('main');loadAll();setInterval(loadAll,10000);
}

function showList(){
    var l=document.getElementById('list'),e=document.getElementById('empty'),s=document.getElementById('search').value.toLowerCase();

function encode(td){return'P1EN:'+btoa(unescape(encodeURIComponent(JSON.stringify({n:td.name,c:td.category,m:td.map,d:td.duration,f:td.difficulty,e:td.description,i:td.instructions,a:td.author||U}))))}
function decode(s){try{s=s.trim();if(s.indexOf('P1EN:')!==0)return null;s=s.replace('P1EN:','');var d=JSON.parse(decodeURIComponent(escape(atob(s))));return[d.n,d.c,d.m,d.d,d.f,d.e,d.i,d.a]}catch(e){return null}}
